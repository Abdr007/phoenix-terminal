name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to least privilege; specific jobs can elevate if needed
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        # engines.node says >=20 — both must work
        node-version: ['20', '22']

    env:
      # Force paper mode during CI so no on-chain action can happen even if
      # tests were to construct a Connection
      SIMULATION_MODE: "true"
      TRADING_ENABLED: "false"
      RPC_URL: "https://api.mainnet-beta.solana.com"

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify binary is executable
        run: |
          test -x dist/index.js
          head -1 dist/index.js | grep -q '^#!/usr/bin/env node'
