name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref when a new push lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to least privilege; specific jobs can elevate if needed
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        # engines.node says >=20 — both must work
        node-version: ['20', '22']

    env:
      # Force paper mode during CI so no on-chain action can happen even if
      # tests were to construct a Connection
      SIMULATION_MODE: "true"
      TRADING_ENABLED: "false"
      RPC_URL: "https://api.mainnet-beta.solana.com"

    steps:
      # Pin actions to commit SHAs (OpenSSF Scorecard best practice) — tag
      # comments after for human readability. Update via Dependabot.
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify binary is executable
        run: |
          test -x dist/index.js
          head -1 dist/index.js | grep -q '^#!/usr/bin/env node'

  # Separate job — surfaces npm audit findings on every PR but doesn't gate
  # the merge (some transitive CVEs have no upstream fix, e.g. bigint-buffer
  # via @solana/spl-token). Visibility > strict gate here.
  npm-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical
