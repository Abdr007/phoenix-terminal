version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # Only allow patch updates automatically — major/minor need manual review
    versioning-strategy: "increase-if-necessary"
    ignore:
      # Ignore major version bumps (breaking changes)
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ora"
        update-types: ["version-update:semver-major"]
      - dependency-name: "bs58"
        update-types: ["version-update:semver-major"]
      - dependency-name: "commander"
        update-types: ["version-update:semver-major"]
    groups:
      solana:
        patterns:
          - "@solana/*"
          - "flash-sdk"
          - "@coral-xyz/*"
          - "@pythnetwork/*"
      dev-tools:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "typescript"
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "prettier"
          - "husky"
          - "lint-staged"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"
