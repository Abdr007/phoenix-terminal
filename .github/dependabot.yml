version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # Only allow patch updates automatically — major/minor need manual review
    versioning-strategy: "increase-if-necessary"
    ignore:
      # Ignore major bumps on packages where breaking changes are non-trivial
      # to migrate. Update list reflects packages we ACTUALLY depend on.
      - dependency-name: "dotenv"
        update-types: ["version-update:semver-major"]
      - dependency-name: "bs58"
        update-types: ["version-update:semver-major"]
      - dependency-name: "chalk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "better-sqlite3"
        update-types: ["version-update:semver-major"]
      # Pin SDK & web3.js — we explicitly pinned these in package.json
      # for binary-format compatibility (see CLAUDE.md). Dependabot must
      # not float them at all.
      - dependency-name: "@ellipsis-labs/phoenix-sdk"
      - dependency-name: "@solana/web3.js"
      - dependency-name: "@anthropic-ai/sdk"
    groups:
      solana:
        patterns:
          - "@solana/*"
          - "@coral-xyz/*"
          - "@pythnetwork/*"
      dev-tools:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "typescript"
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
          - "prettier"
          - "@types/*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"
