<svg viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="phoenix-terminal — interactive trading terminal for the Phoenix CLOB on Solana">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#070707"/>
      <stop offset="60%" stop-color="#100c08"/>
      <stop offset="100%" stop-color="#1c1107"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#FF4B1F"/>
      <stop offset="55%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FFB627"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%"  stop-color="#FF6B35" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#FF6B35" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glow)"/>

  <!-- Terminal viewport corner brackets -->
  <g stroke="#FF6B35" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M 36 36 L 36 76  M 36 36 L 76 36"/>
    <path d="M 1244 36 L 1244 76  M 1244 36 L 1204 36"/>
    <path d="M 36 364 L 36 324  M 36 364 L 76 364"/>
    <path d="M 1244 364 L 1244 324  M 1244 364 L 1204 364"/>
  </g>

  <!-- Flame mark, vertically centered on the left -->
  <g transform="translate(190 200)">
    <!-- Soft glow behind flame -->
    <ellipse cx="0" cy="0" rx="90" ry="120" fill="url(#ember)" opacity="0.18" filter="url(#softGlow)"/>
    <!-- Outer flame silhouette -->
    <path d="M 0 -110
             C 50 -70, 78 -28, 78 12
             C 78 60, 42 96, 0 102
             C -42 96, -78 60, -78 12
             C -78 -28, -50 -70, 0 -110 Z"
          fill="url(#ember)"/>
    <!-- Inner cutout (the flame channel) -->
    <path d="M 0 -56
             C 28 -32, 44 -10, 44 12
             C 44 36, 22 56, 0 58
             C -22 56, -44 36, -44 12
             C -44 -10, -28 -32, 0 -56 Z"
          fill="#0a0805"/>
    <!-- Inner ember dot -->
    <circle cx="0" cy="16" r="14" fill="url(#ember)"/>
  </g>

  <!-- Wordmark — PHOENIX in ember -->
  <text x="340" y="200"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="900"
        font-size="118"
        fill="url(#ember)"
        letter-spacing="-3">PHOENIX</text>

  <!-- TERMINAL subtitle — lighter, wider letter-spacing -->
  <text x="343" y="252"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="36"
        fill="#FFB627"
        letter-spacing="14">TERMINAL</text>

  <!-- Tagline -->
  <text x="340" y="304"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="22"
        fill="#B8C1BB">Interactive trading terminal for the Phoenix CLOB on Solana</text>

  <!-- Stats strip -->
  <text x="340" y="340"
        font-family="'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace"
        font-size="14"
        fill="#6B7B73"
        letter-spacing="0.5">40 commands  ·  inventory-aware MM  ·  WAC PnL journal  ·  Jito bundles  ·  Claude-powered CLI</text>
</svg>
